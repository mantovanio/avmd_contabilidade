<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVMD Contábil | CRM Kanban</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="crm.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="env-config.js"></script>
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@dnd-kit/core@6.0.8/dist/dnd-kit-core.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@dnd-kit/sortable@7.0.2/dist/dnd-kit-sortable.umd.min.js"></script>
    <meta name="description" content="CRM Kanban para gerenciamento de leads - AVMD Contábil">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo-container">
                <div class="logo-icon">AV</div>
                <span class="logo-text">AVMD<span>Contábil</span></span>
            </div>
            
            <nav class="nav-menu">
                <a href="index.html" class="nav-item">
                    <span class="icon">💬</span> Chat Inteligente
                </a>
                <a href="crm.html" class="nav-item active">
                    <span class="icon">👥</span> CRM Kanban
                </a>
                <a href="#" class="nav-item">
                    <span class="icon">📊</span> Dashboard
                </a>
            </nav>

            <div class="user-info">
                <div class="avatar">U</div>
                <div class="info">
                    <p class="name">Usuário AVMD</p>
                    <p class="status">Online</p>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <h1>CRM - Gerenciamento de Leads</h1>
                <div class="actions">
                    <button class="btn-icon" title="Atualizar Dados" id="refresh-crm">🔄</button>
                    <button class="btn-icon" title="Configurações" id="open-crm-settings">⚙️</button>
                </div>
            </header>

            <!-- Loading State -->
            <div id="loading-state" class="loading-container">
                <div class="spinner"></div>
                <p>Carregando leads...</p>
            </div>

            <!-- Error State -->
            <div id="error-state" class="error-container" style="display: none;">
                <div class="error-icon">❌</div>
                <h3>Ops! Ocorreu um erro.</h3>
                <p id="error-message">Não foi possível carregar os dados do CRM.</p>
                <button id="retry-button" class="btn-primary">Tentar Novamente</button>
            </div>

            <!-- Kanban Board -->
            <div id="kanban-container" class="kanban-container" style="display: none;">
                <div id="kanban-board" class="kanban-board">
                    <!-- Colunas serão geradas dinamicamente pelo JavaScript -->
                </div>
            </div>
        </main>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Configurações do CRM</h2>
                <button class="close-modal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="setting-item">
                    <label>URL do Supabase</label>
                    <div class="input-group">
                        <input type="text" id="supabase-url-input" placeholder="https://seu-projeto.supabase.co">
                    </div>
                </div>
                <div class="setting-item">
                    <label>Chave Anônima do Supabase</label>
                    <div class="input-group">
                        <input type="password" id="supabase-key-input" placeholder="chave-anonima-supabase">
                        <button id="toggle-key-visibility">👁️</button>
                    </div>
                    <p class="help-text">Sua chave é salva apenas localmente no seu navegador.</p>
                </div>
            </div>
            <div class="modal-footer">
                <button id="save-crm-settings" class="btn-primary">Salvar Configurações</button>
            </div>
        </div>
    </div>

    <script src="crm.js"></script>
</body>
</html>
