<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVMD Contábil | Agente IA</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <meta name="description" content="Agente de Inteligência Artificial para suporte contábil especializado da AVMD Contábil.">
    <script src="env-config.js"></script>
    <script src="config.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo-container">
                <div class="logo-icon">AV</div>
                <span class="logo-text">AVMD<span>Contábil</span></span>
            </div>
            
            <nav class="nav-menu">
                <button class="nav-item active" id="btn-chat">
                    <span class="icon">💬</span> Chat Inteligente
                </button>
                <button class="nav-item" id="btn-docs">
                    <span class="icon">📄</span> Documentos
                </button>
                <button class="nav-item" id="btn-history">
                    <span class="icon">🕒</span> Histórico
                </button>
                <a href="crm.html" class="nav-item">
                    <span class="icon">👥</span> CRM Kanban
                </a>
            </nav>

            <div class="settings-group">
                <label for="model-select">Modelo de IA</label>
                <select id="model-select">
                    <option value="deepseek/deepseek-chat:free">DeepSeek Chat (Gratuito)</option>
                    <option value="google/gemini-2.0-flash-exp:free">Gemini 2.0 Flash (Gratuito)</option>
                    <option value="google/gemini-2.0-flash-001">Gemini 3 Flash (Ultra Rápido)</option>
                    <option value="anthropic/claude-3.5-sonnet">Claude 3.5 Sonnet (Recomendado)</option>
                    <option value="openai/gpt-4o">GPT-4o</option>
                    <option value="meta-llama/llama-3.1-70b-instruct">Llama 3.1 (Rápido)</option>
                </select>
                
                <div class="theme-toggle-container">
                    <label for="theme-toggle">Tema</label>
                    <div class="toggle-wrapper">
                        <span>🌙</span>
                        <label class="toggle">
                            <input type="checkbox" id="theme-toggle">
                            <span class="slider round"></span>
                        </label>
                        <span>☀️</span>
                    </div>
                </div>
            </div>

            <div class="user-info">
                <div class="avatar">U</div>
                <div class="info">
                    <p class="name">Usuário AVMD</p>
                    <p class="status">Online</p>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <h1>Agente IA Contabilidade</h1>
                <div class="actions">
                    <button class="btn-icon" title="Limpar Conversa" id="clear-chat">🗑️</button>
                    <button class="btn-icon" title="Configurações" id="open-settings">⚙️</button>
                </div>
            </header>

            <div class="chat-container" id="chat-messages">
                <div class="message assistant">
                    <div class="msg-content">
                        Olá! Sou o seu assistente de IA especializado em contabilidade. Como posso ajudar com seus impostos, documentos ou dúvidas hoje?
                    </div>
                </div>
            </div>

            <div class="quick-actions">
                <button class="quick-btn" data-prompt="Calcule o Simples Nacional para um faturamento de R$ 10.000">📊 Simples Nacional</button>
                <button class="quick-btn" data-prompt="Explique quais são as obrigações acessórias deste mês">📅 Obrigações do Mês</button>
                <button class="quick-btn" data-prompt="Como faço para emitir uma nota fiscal de serviço?">📝 Emitir Nota</button>
                <button class="quick-btn" data-prompt="Quais são as diferenças entre Lucro Real, Lucro Presumido e Simples Nacional?">🧮 Regimes Tributários</button>
                <button class="quick-btn" data-prompt="Qual o prazo para entregar a declaração do IRPJ?">⏱️ Prazos Fiscais</button>
                <button class="quick-btn" data-prompt="Como calcular a folha de pagamento com férias e 13º?">👥 Folha Pagamento</button>
            </div>

            <footer class="input-area">
                <div class="input-wrapper">
                    <textarea id="user-input" placeholder="Digite sua dúvida contábil aqui..." rows="1"></textarea>
                    <button id="send-btn">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M22 2L11 13M22 2L15 22L11 13M11 13L2 9L22 2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
            </footer>
        </main>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Configurações do Agente</h2>
                <button class="close-modal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="setting-item">
                    <label>Chave de API (OpenRouter)</label>
                    <div class="input-group">
                        <input type="password" id="api-key-input" placeholder="sk-or-v1-...">
                        <button id="toggle-api-visibility">👁️</button>
                    </div>
                    <p class="help-text">Sua chave é salva apenas localmente no seu navegador.</p>
                </div>
                <div class="setting-item">
                    <label>Instruções do Sistema</label>
                    <textarea id="system-prompt" rows="6">Você é um assistente virtual especializado em contabilidade brasileira para a empresa AVMD Contábil.

Você possui conhecimento especializado nas seguintes áreas:
1. Tributação: Simples Nacional, MEI, Lucro Presumido, Lucro Real, ICMS, ISS, PIS/COFINS, IRPJ, CSLL.
2. Obrigações acessórias: SPED Contábil, SPED Fiscal, EFD-Reinf, DIRF, DCTF, RAIS, CAGED.
3. Abertura e alterações de empresas.
4. Gestão financeira: fluxo de caixa, análise de demonstrações contábeis, indicadores financeiros.
5. Folha de pagamento: cálculos, encargos, férias, 13º salário, rescisões.

Quando o usuário fizer perguntas específicas:
- Explique de forma clara e objetiva, usando termos técnicos adequados
- Mencione a legislação aplicável (leis, instruções normativas, etc.)
- Forneça exemplos práticos quando possível
- Indique prazos e obrigações importantes
- Sempre verifique se a informação é atual e aplicável ao contexto brasileiro

Quando possível, mencione as particularidades dos diferentes regimes tributários (Simples, MEI, Presumido, Real).

Seja profissional, preciso, educado e útil. Não invente informações e esclareça quando não tiver dados suficientes para uma resposta completa.</textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button id="save-settings" class="btn-primary">Salvar Configurações</button>
            </div>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
