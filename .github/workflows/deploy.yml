name: Deploy CertiID

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Decodificar chave SSH
        run: |
          echo "SSH_KEY<<EOF" >> $GITHUB_ENV
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Deploy na VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 147.79.111.76
          username: root
          key: ${{ env.SSH_KEY }}
          script: bash /opt/certiid/deploy.sh
