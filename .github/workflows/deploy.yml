name: Deploy CertiID

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Decodificar chave SSH
        run: |
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > "$RUNNER_TEMP/deploy_key"
          chmod 600 "$RUNNER_TEMP/deploy_key"

      - name: Deploy na VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 147.79.111.76
          username: root
          key_path: /github/runner_temp/deploy_key
          script: bash /opt/certiid/deploy.sh
