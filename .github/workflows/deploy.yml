name: Deploy CertiID

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preparar chave SSH
        run: |
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > "$GITHUB_WORKSPACE/deploy_key"
          chmod 644 "$GITHUB_WORKSPACE/deploy_key"

      - name: Deploy na VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 147.79.111.76
          username: root
          key_path: /github/workspace/deploy_key
          script: |
            set -e
            cd /opt/certiid
            git fetch origin main
            git reset --hard origin/main
            bash ./deploy.sh
