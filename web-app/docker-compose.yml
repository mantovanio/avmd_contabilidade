version: '3.8'
services:
  avmd-contabil:
    image: mantovanio/avmd-contabil:latest
    restart: always
    deploy:
      replicas: 1
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.avmd-contabil.rule=Host(`contabil.mantovan.com.br`)"
        - "traefik.http.routers.avmd-contabil.entrypoints=websecure"
        - "traefik.http.routers.avmd-contabil.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.avmd-contabil.loadbalancer.server.port=80"
        - "traefik.docker.network=renova-app_web-public"
    networks:
      - web-public
networks:
  web-public:
    external: true
    name: renova-app_web-public
  